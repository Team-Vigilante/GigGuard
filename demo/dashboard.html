<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GigGuard — Case Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; }

  .header { background: #1a365d; color: white; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
  .header .tagline { font-size: 13px; color: #90cdf4; margin-top: 4px; }

  .container { max-width: 860px; margin: 40px auto; padding: 0 20px; }

  .reference-block { background: white; border-radius: 12px; padding: 30px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
  .reference-block .ref-label { font-size: 13px; color: #718096; text-transform: uppercase; letter-spacing: 1px; }
  .reference-block .ref-number { font-size: 36px; font-weight: 800; color: #1a365d; margin: 8px 0; letter-spacing: 2px; }
  .reference-block .ref-sub { font-size: 14px; color: #718096; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .info-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .info-card .label { font-size: 12px; color: #718096; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .info-card .value { font-size: 18px; font-weight: 600; color: #2d3748; }

  .badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .badge-swiggy { background: #fff3e0; color: #e65100; }
  .badge-zomato { background: #fce4ec; color: #c62828; }
  .badge-ola { background: #e8f5e9; color: #2e7d32; }
  .badge-uber { background: #e3f2fd; color: #1565c0; }
  .badge-default { background: #ede7f6; color: #4527a0; }

  .status-filed { background: #fefcbf; color: #744210; }
  .status-escalated { background: #fed7aa; color: #7c2d12; }
  .status-resolved { background: #c6f6d5; color: #1a4731; }

  .timeline-card { background: white; border-radius: 12px; padding: 30px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .timeline-card h3 { font-size: 16px; font-weight: 700; color: #2d3748; margin-bottom: 24px; }
  .timeline { position: relative; padding-left: 32px; }
  .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }
  .timeline-item { position: relative; margin-bottom: 28px; }
  .timeline-item:last-child { margin-bottom: 0; }
  .timeline-dot { position: absolute; left: -26px; top: 4px; width: 14px; height: 14px; border-radius: 50%; background: #cbd5e0; border: 2px solid white; }
  .timeline-dot.done { background: #48bb78; }
  .timeline-dot.pending { background: #ed8936; }
  .timeline-date { font-size: 12px; color: #718096; margin-bottom: 4px; }
  .timeline-title { font-size: 15px; font-weight: 600; color: #2d3748; }
  .timeline-sub { font-size: 13px; color: #718096; margin-top: 2px; }

  .next-action { background: #ebf8ff; border: 1px solid #bee3f8; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .next-action h3 { font-size: 15px; font-weight: 700; color: #2c5282; margin-bottom: 8px; }
  .next-action p { font-size: 14px; color: #2d3748; line-height: 1.6; }
  .next-action .expected { font-size: 13px; color: #4a90d9; margin-top: 8px; font-weight: 600; }

  .btn { display: inline-block; padding: 12px 28px; background: #1a365d; color: white; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; }
  .btn:hover { background: #2a4a7f; }

  .loading { text-align: center; padding: 60px; color: #718096; font-size: 16px; }
  .error-msg { background: #fed7d7; color: #742a2a; padding: 20px; border-radius: 12px; margin-bottom: 24px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="h1" style="font-size:28px;font-weight:800;letter-spacing:1px;">⚖️ GigGuard</div>
    <div class="tagline">Your AI Legal Advocate — Fighting for Gig Workers</div>
  </div>
  <div style="font-size:13px;color:#90cdf4;">Case Tracking Dashboard</div>
</div>

<div class="container">
  <div id="loading" class="loading">Loading your case...</div>
  <div id="dashboard" style="display:none;"></div>
</div>

<script>
const DEMO_DATA = {
  reference_id: "SWG-2026-061847",
  phone_number: "+91 XXXXX XX821",
  platform: "Swiggy",
  case_status: "escalated",
  filed_at: "2026-06-07",
  channel: "Swiggy Grievance Officer",
  channel_email: "grievances@swiggy.in",
  expected_response_date: "2026-06-14",
  escalation_schedule: {
    tier2_date: "2026-06-14",
    tier3_date: "2026-07-07",
    tier4_date: "2026-08-06"
  },
  grievance_letter_url: "#",
  timeline: [
    { date: "Jun 7, 2026", title: "Case Filed with Swiggy", sub: "Reference: SWG-2026-061847", done: true },
    { date: "Jun 14, 2026", title: "No response — Escalated to Labour Dept", sub: "State Labour Department notified", done: true },
    { date: "Jul 7, 2026", title: "Escalation to National Social Security Board", sub: "Expected if no resolution", done: false },
  ],
  next_action: "Awaiting response from State Labour Department. If no resolution by July 7, 2026, the case will be automatically escalated to the National Social Security Board.",
  next_action_date: "July 7, 2026"
};

function getPlatformBadgeClass(platform) {
  const map = { swiggy: 'badge-swiggy', zomato: 'badge-zomato', ola: 'badge-ola', uber: 'badge-uber' };
  return map[platform.toLowerCase()] || 'badge-default';
}

function getStatusBadgeClass(status) {
  const map = { filed: 'status-filed', escalated: 'status-escalated', resolved: 'status-resolved' };
  return map[status.toLowerCase()] || 'status-filed';
}

function getStatusLabel(status) {
  const map = { filed: '🟡 Filed', escalated: '🟠 Escalated', resolved: '🟢 Resolved' };
  return map[status.toLowerCase()] || status;
}

function renderDashboard(data) {
  const dash = document.getElementById('dashboard');
  dash.innerHTML = `
    <div class="reference-block">
      <div class="ref-label">Case Reference Number</div>
      <div class="ref-number">${data.reference_id}</div>
      <div class="ref-sub">Filed on ${data.filed_at} &nbsp;|&nbsp; ${data.channel}</div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="label">Worker</div>
        <div class="value">${data.phone_number}</div>
      </div>
      <div class="info-card">
        <div class="label">Platform</div>
        <div class="value"><span class="badge ${getPlatformBadgeClass(data.platform)}">${data.platform}</span></div>
      </div>
      <div class="info-card">
        <div class="label">Case Status</div>
        <div class="value"><span class="badge ${getStatusBadgeClass(data.case_status)}">${getStatusLabel(data.case_status)}</span></div>
      </div>
      <div class="info-card">
        <div class="label">Filed With</div>
        <div class="value" style="font-size:14px;">${data.channel_email}</div>
      </div>
    </div>

    <div class="timeline-card">
      <h3>📅 Case Timeline</h3>
      <div class="timeline">
        ${data.timeline.map(t => `
          <div class="timeline-item">
            <div class="timeline-dot ${t.done ? 'done' : 'pending'}"></div>
            <div class="timeline-date">${t.date}</div>
            <div class="timeline-title">${t.title} ${t.done ? '✓' : ''}</div>
            <div class="timeline-sub">${t.sub}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="next-action">
      <h3>⏭ Next Action</h3>
      <p>${data.next_action}</p>
      <div class="expected">Expected by: ${data.next_action_date}</div>
    </div>

    <div style="text-align:center;margin-bottom:40px;">
      <a class="btn" href="${data.grievance_letter_url}">📄 View Grievance Letter</a>
    </div>
  `;
  document.getElementById('loading').style.display = 'none';
  dash.style.display = 'block';
}

async function loadCase() {
  const params = new URLSearchParams(window.location.search);
  const caseId = params.get('case_id');

  if (!caseId) {
    renderDashboard(DEMO_DATA);
    return;
  }

  try {
    const response = await fetch(`/dashboard/${caseId}`);
    if (!response.ok) throw new Error('API not available');
    const data = await response.json();
    renderDashboard(data);
  } catch (e) {
    renderDashboard(DEMO_DATA);
  }
}

loadCase();
</script>
</body>
</html>
